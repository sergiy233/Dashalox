<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐄 Молочна Ферма Даші!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Nunito',sans-serif;
    overflow:hidden; height:100vh; width:100vw;
    user-select:none;
  }
  .sky {
    position:absolute; inset:0;
    background:linear-gradient(180deg,#87CEEB 0%,#B0E2FF 55%,#C8F0C8 75%,#5DBB63 100%);
  }
  .sun {
    position:absolute; top:18px; right:60px;
    width:55px; height:55px;
    background:radial-gradient(circle,#FFE566,#FFD700);
    border-radius:50%;
    box-shadow:0 0 25px #FFD700,0 0 50px #FFD70066;
    animation:sunPulse 3s ease-in-out infinite;
  }
  @keyframes sunPulse{0%,100%{box-shadow:0 0 25px #FFD700,0 0 50px #FFD70066;}50%{box-shadow:0 0 40px #FFD700,0 0 80px #FFD70088;}}

  .cloud{position:absolute;background:white;border-radius:50px;opacity:.85;animation:drift linear infinite;}
  .cloud::before,.cloud::after{content:'';position:absolute;background:white;border-radius:50%;}
  .c1{width:90px;height:30px;top:40px;animation-duration:22s;animation-delay:-4s;}
  .c1::before{width:48px;height:48px;top:-24px;left:12px;}.c1::after{width:36px;height:36px;top:-18px;left:40px;}
  .c2{width:70px;height:24px;top:80px;animation-duration:30s;animation-delay:-12s;}
  .c2::before{width:38px;height:38px;top:-20px;left:8px;}.c2::after{width:28px;height:28px;top:-14px;left:32px;}
  @keyframes drift{from{left:-160px;}to{left:110vw;}}

  /* GROUND — top 58% of screen = sky, bottom 42% = ground */
  .ground{
    position:absolute; bottom:0; left:0; right:0;
    height:42%;
    background:linear-gradient(180deg,#5DBB63 0%,#3D9A42 100%);
    border-top:5px solid #2E7D32;
  }

  /* BARN — sits on ground line */
  .barn{position:absolute; bottom:42%; left:40px; width:110px;}
  .barn-roof{width:0;height:0;border-left:60px solid transparent;border-right:60px solid transparent;border-bottom:48px solid #8B0000;margin:0 auto;}
  .barn-body{width:110px;height:72px;background:#C0392B;border:3px solid #8B0000;display:flex;align-items:flex-end;justify-content:center;position:relative;}
  .barn-door{width:38px;height:48px;background:#8B4513;border:2px solid #5D2E0C;border-radius:19px 19px 0 0;position:absolute;bottom:0;}
  .barn-window{width:22px;height:22px;background:#FFE566;border:2px solid #8B0000;border-radius:3px;position:absolute;top:12px;}
  .barn-window.left{left:8px;}.barn-window.right{right:8px;}

  /* FENCE */
  .fence{position:absolute;bottom:42%;left:160px;right:0;height:44px;display:flex;align-items:flex-end;gap:16px;padding-left:8px;}
  .fence-post{width:9px;height:44px;background:#DEB887;border-radius:3px 3px 0 0;position:relative;flex-shrink:0;}
  .fence-rail{position:absolute;left:-4px;width:24px;height:7px;background:#D2A679;border-radius:3px;}
  .fence-rail.top{top:8px;}.fence-rail.bot{top:22px;}

  .grass-blade{position:absolute;bottom:42%;width:7px;background:#3D9A42;border-radius:4px 4px 0 0;transform-origin:bottom center;}

  /* ── SCORE ── */
  .score-board{
    position:absolute;top:12px;left:50%;transform:translateX(-50%);
    background:rgba(255,255,255,.94);border:4px solid #FFD700;border-radius:18px;
    padding:6px 22px;text-align:center;box-shadow:0 5px 18px rgba(0,0,0,.2);z-index:100;
  }
  .score-label{font-family:'Lilita One',cursive;font-size:11px;color:#5DBB63;letter-spacing:2px;text-transform:uppercase;}
  .score-number{font-family:'Lilita One',cursive;font-size:38px;color:#C0392B;line-height:1;text-shadow:3px 3px 0 #FFD700;}
  .score-unit{font-size:10px;color:#888;font-weight:700;}

  /* ── PROGRESS ── */
  .progress-wrap{
    position:absolute;top:12px;right:14px;width:155px;
    background:rgba(255,255,255,.92);border:3px solid #5DBB63;border-radius:12px;
    padding:8px 11px;box-shadow:0 4px 14px rgba(0,0,0,.15);
  }
  .progress-label{font-family:'Lilita One',cursive;font-size:10px;color:#5DBB63;margin-bottom:5px;text-transform:uppercase;letter-spacing:1px;}
  .progress-bar-bg{background:#E0E0E0;border-radius:8px;height:14px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,#5DBB63,#FFD700);border-radius:8px;transition:width .3s ease;width:0%;}
  .progress-next{font-size:10px;color:#888;margin-top:3px;font-weight:700;}

  /* ── COW — left side, on ground ── */
  .cow-zone{
    position:absolute;
    left:14%;
    bottom:42%;
    display:flex;flex-direction:column;align-items:center;
  }
  .cow-wrap{position:relative;}
  .cow{
    font-size:72px;line-height:1;display:block;
    filter:drop-shadow(3px 3px 0 rgba(0,0,0,.2));
    transition:transform .1s;cursor:pointer;
  }
  .cow:hover{transform:scale(1.1) rotate(-3deg);}
  .cow:active{transform:scale(0.92);}
  .cow-bubble{
    position:absolute;top:-64px;left:50%;transform:translateX(-50%);
    background:white;border:3px solid #333;border-radius:14px;
    padding:6px 12px;font-family:'Lilita One',cursive;font-size:13px;
    white-space:nowrap;opacity:0;pointer-events:none;
    box-shadow:2px 2px 0 #333;transition:opacity .2s;z-index:50;
  }
  .cow-bubble.show{opacity:1;}

  /* ── UDDER — великий, поруч з коровою ── */
  .udder-zone{
    position:absolute;
    left:36%;
    transform:translateX(-50%);
    bottom:42%;
    display:flex;flex-direction:column;align-items:center;
    cursor:pointer;
    z-index:25;
  }
  .udder-body{
    width:155px;
    height:210px;
    background:radial-gradient(ellipse at 40% 30%,#FFD6E0 0%,#FFB6C1 25%,#FF85A1 55%,#FF69B4 80%,#E91E8C 100%);
    border:4px solid #FF1493;
    border-radius:50% 50% 42% 42% / 38% 38% 52% 52%;
    box-shadow:0 8px 30px rgba(255,20,147,.5),inset 0 -10px 24px rgba(255,255,255,.25),inset 4px 4px 12px rgba(255,255,255,.3);
    transition:transform .12s,box-shadow .12s;
    display:flex;flex-direction:column;align-items:center;
    justify-content:space-between;
    padding:20px 0 14px;
    animation:udderWobble 2.5s ease-in-out infinite;
  }
  @keyframes udderWobble{
    0%,100%{transform:scaleX(1) scaleY(1);}
    50%{transform:scaleX(1.03) scaleY(0.98);}
  }
  .udder-zone:hover .udder-body{transform:scaleY(1.07) scaleX(1.04);box-shadow:0 16px 40px rgba(255,20,147,.65);animation:none;}
  .udder-zone:active .udder-body{transform:scaleY(0.88) scaleX(1.08);box-shadow:0 3px 10px rgba(255,20,147,.35);animation:none;}
  .udder-label{font-family:'Lilita One',cursive;font-size:16px;color:white;text-shadow:2px 2px 0 rgba(0,0,0,.35);text-align:center;line-height:1.3;}
  .udder-spots{display:flex;flex-direction:column;gap:6px;align-items:center;}
  .udder-spot{background:rgba(255,255,255,.3);border-radius:50%;}
  .udder-teats{display:flex;gap:13px;align-items:flex-end;}
  .teat{width:18px;height:46px;background:linear-gradient(180deg,#FF85A1,#C0006A);border-radius:9px 9px 14px 14px;border:3px solid #A00055;box-shadow:0 5px 12px rgba(192,0,106,.5);}
  /* крапля молока на сосках */
  .teat::after{content:'💧';position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:14px;opacity:0;}
  .udder-zone:active .teat::after{opacity:1;}

  /* ── FARMER ДАША — right side ── */
  .farmer-zone{
    position:absolute;
    right:6%;
    bottom:42%;
    display:flex;flex-direction:column;align-items:center;
    z-index:10;
  }
  .bubble{
    position:absolute;top:-66px;left:50%;transform:translateX(-50%);
    background:white;border:3px solid #333;border-radius:16px;
    padding:6px 13px;font-family:'Lilita One',cursive;font-size:13px;
    white-space:nowrap;opacity:0;transition:opacity .2s;
    pointer-events:none;box-shadow:2px 2px 0 #333;z-index:50;
  }
  .bubble::after{content:'';position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#333;}
  .bubble::before{content:'';position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:white;z-index:1;}
  .bubble.show{opacity:1;}
  .farmer{font-size:90px;line-height:1;display:block;filter:drop-shadow(3px 3px 0 rgba(0,0,0,.2));position:relative;}
  .farmer.splashed{animation:shake .5s ease-in-out;}
  @keyframes shake{0%,100%{transform:rotate(0)}15%{transform:rotate(-14deg) scale(1.1)}30%{transform:rotate(11deg) scale(1.14)}45%{transform:rotate(-9deg)}60%{transform:rotate(7deg)}75%{transform:rotate(-4deg)}90%{transform:rotate(3deg)}}
  .milk-overlay{position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:34px;opacity:0;pointer-events:none;transition:opacity .2s;}
  .milk-overlay.show{opacity:1;}
  .farmer-name{
    font-family:'Lilita One',cursive;font-size:19px;
    color:#C0392B;text-shadow:2px 2px 0 #FFD700;
    margin-top:4px;background:rgba(255,255,255,.78);
    padding:2px 10px;border-radius:10px;border:2px solid #FFD700;
    letter-spacing:1px;
  }

  /* ── MILK PROJECTILE ── */
  .milk-proj{
    position:fixed;pointer-events:none;z-index:300;
    animation:milkShoot var(--dur,0.6s) cubic-bezier(.2,.6,.4,1) forwards;
  }
  @keyframes milkShoot{
    0%{opacity:1;transform:translate(0,0) scale(1.3);}
    40%{opacity:1;transform:translate(calc(var(--tx)*.45), calc(var(--ty)*.25 - 55px)) scale(1.4);}
    85%{opacity:1;transform:translate(calc(var(--tx)*.92), calc(var(--ty)*.9)) scale(1.1);}
    100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.5);}
  }
  .hit-particle{position:fixed;pointer-events:none;z-index:310;animation:hitBurst .55s ease-out forwards;}
  @keyframes hitBurst{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--hx),var(--hy)) scale(0.2);}}

  .plus-one{position:fixed;font-family:'Lilita One',cursive;font-size:24px;color:white;text-shadow:2px 2px 0 #C0392B;pointer-events:none;z-index:400;animation:floatUp .85s ease-out forwards;}
  @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-70px) scale(1.4);}}

  .star{position:fixed;pointer-events:none;z-index:400;animation:starBurst 1s ease-out forwards;}
  @keyframes starBurst{0%{opacity:1;transform:translate(0,0) scale(0);}50%{opacity:1;transform:translate(var(--sx),var(--sy)) scale(1.2);}100%{opacity:0;transform:translate(calc(var(--sx)*1.6),calc(var(--sy)*1.6)) scale(0.5);}}

  .milestone{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
    background:linear-gradient(135deg,#FFD700,#FF6B35);border:5px solid white;border-radius:26px;
    padding:18px 36px;font-family:'Lilita One',cursive;font-size:22px;color:white;text-align:center;
    z-index:999;box-shadow:0 10px 40px rgba(0,0,0,.4);pointer-events:none;
    text-shadow:2px 2px 0 rgba(0,0,0,.3);
  }
  .milestone.pop{animation:milestoneAnim 1.8s ease-out forwards;}
  @keyframes milestoneAnim{
    0%{transform:translate(-50%,-50%) scale(0) rotate(-5deg);opacity:0;}
    15%{transform:translate(-50%,-50%) scale(1.2) rotate(3deg);opacity:1;}
    25%{transform:translate(-50%,-50%) scale(1) rotate(0);opacity:1;}
    70%{transform:translate(-50%,-50%) scale(1) rotate(0);opacity:1;}
    100%{transform:translate(-50%,-50%) scale(.8) rotate(5deg);opacity:0;}
  }

  .bucket-wrap{position:absolute;left:calc(36% + 90px);bottom:calc(42% + 2px);font-size:30px;z-index:20;filter:drop-shadow(2px 2px 0 rgba(0,0,0,.2));}
  .bucket-wrap.fill{animation:bJiggle .3s;}
  @keyframes bJiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}

  .reset-btn{
    position:absolute;top:12px;left:12px;background:#C0392B;border:3px solid #8B0000;
    border-radius:10px;padding:7px 12px;font-family:'Lilita One',cursive;font-size:12px;
    color:white;cursor:pointer;box-shadow:0 3px 0 #6B0000;transition:all .1s;z-index:200;
  }
  .reset-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #6B0000;}
</style>
</head>
<body>
<div class="sky"></div>
<div class="sun"></div>
<div class="cloud c1" style="left:-160px"></div>
<div class="cloud c2" style="left:-80px"></div>

<div class="barn">
  <div class="barn-roof"></div>
  <div class="barn-body">
    <div class="barn-window left"></div>
    <div class="barn-window right"></div>
    <div class="barn-door"></div>
  </div>
</div>
<div class="ground"></div>
<div class="fence" id="fence"></div>

<div class="score-board">
  <div class="score-label">🥛 Молоко зібрано</div>
  <div class="score-number" id="scoreNum">0</div>
  <div class="score-unit">літрів</div>
</div>

<div class="progress-wrap">
  <div class="progress-label">До наступного 🏆</div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div class="progress-next" id="progressNext">Ще 10 кліків</div>
</div>

<!-- COW -->
<div class="cow-zone">
  <div class="cow-wrap">
    <div class="cow-bubble" id="cowBubble">🐄 Муу!</div>
    <span class="cow" id="cow">🐄</span>
  </div>
</div>

<!-- UDDER — великий, поруч з коровою -->
<div class="udder-zone" id="udderBtn">
  <div class="udder-body">
    <div class="udder-label">🍼<br>ВИМ'Я!</div>
    <div class="udder-spots">
      <div class="udder-spot" style="width:32px;height:18px;"></div>
      <div class="udder-spot" style="width:22px;height:14px;"></div>
      <div class="udder-spot" style="width:16px;height:10px;"></div>
    </div>
    <div class="udder-teats">
      <div class="teat"></div>
      <div class="teat" style="height:38px;"></div>
      <div class="teat" style="height:52px;"></div>
      <div class="teat" style="height:38px;"></div>
      <div class="teat"></div>
    </div>
  </div>
</div>

<!-- BUCKET -->
<div class="bucket-wrap" id="bucket">🪣</div>

<!-- FARMER ДАША -->
<div class="farmer-zone" id="farmerZone">
  <div class="bubble" id="farmerBubble">Ааа! Холодне!</div>
  <span class="milk-overlay" id="milkOverlay">💦</span>
  <span class="farmer" id="farmer">👩‍🌾</span>
  <div class="farmer-name">🌸 Даша</div>
</div>

<div class="milestone" id="milestone">🏆</div>
<button class="reset-btn" onclick="resetGame()">🔄 Скинути</button>

<script>
  let score = 0;
  const cowBubbles = ['Муу!','Гарно!','Ще-ще!','Моо!','Добре!','Ха-ха!','Уух!','Топ!'];
  const farmerBubbles = ['Ааа! Холодне!','Ой мокра!','Знову?!','Стій корово!','Ні-ні!','Бризки!','Рятуйте!','Даша мокра!','Молоко в обличчя!','ХОЛОДНЕ!'];
  const milestones = [10,25,50,100,200,500,1000];
  let nextMilestoneIdx = 0;

  // Fence
  const fence = document.getElementById('fence');
  for(let i=0;i<50;i++){
    const p=document.createElement('div'); p.className='fence-post';
    p.innerHTML='<div class="fence-rail top"></div><div class="fence-rail bot"></div>';
    fence.appendChild(p);
  }
  // Grass
  for(let i=0;i<25;i++){
    const b=document.createElement('div'); b.className='grass-blade';
    b.style.left=Math.random()*100+'vw';
    b.style.height=(14+Math.random()*18)+'px';
    b.style.transform=`rotate(${(Math.random()-.5)*28}deg)`;
    document.body.appendChild(b);
  }

  const scoreNum=document.getElementById('scoreNum');
  const progressFill=document.getElementById('progressFill');
  const progressNext=document.getElementById('progressNext');
  const farmer=document.getElementById('farmer');
  const farmerBubble=document.getElementById('farmerBubble');
  const milkOverlay=document.getElementById('milkOverlay');
  const cowBubble=document.getElementById('cowBubble');
  const milestoneEl=document.getElementById('milestone');
  const bucket=document.getElementById('bucket');
  const cow=document.getElementById('cow');
  const farmerZone=document.getElementById('farmerZone');
  const udderBtn=document.getElementById('udderBtn');
  let farmerTimer,cowTimer;

  function getFarmerCenter(){
    const r=farmerZone.getBoundingClientRect();
    return {x:r.left+r.width/2, y:r.top+r.height*0.35};
  }
  function getUdderCenter(){
    const r=udderBtn.getBoundingClientRect();
    return {x:r.left+r.width/2, y:r.top+r.height*0.8};
  }

  function updateProgress(){
    const prev=nextMilestoneIdx>0?milestones[nextMilestoneIdx-1]:0;
    const next=milestones[nextMilestoneIdx]||(milestones[milestones.length-1]+100);
    progressFill.style.width=Math.min(100,((score-prev)/(next-prev))*100)+'%';
    progressNext.textContent=`Ще ${Math.max(0,next-score)} кліків`;
  }

  /* shoot milk drops from udder → Dasha */
  function shootMilk(){
    const from=getUdderCenter();
    const to=getFarmerCenter();
    const emojis=['🥛','💧','💦','🫧','🥛','💧'];
    const count=6+Math.floor(Math.random()*4);
    for(let i=0;i<count;i++){
      setTimeout(()=>{
        const el=document.createElement('div');
        el.className='milk-proj';
        el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
        const spread=30;
        const tx=(to.x-from.x)+(Math.random()-.5)*spread;
        const ty=(to.y-from.y)+(Math.random()-.5)*spread;
        const dur=0.5+Math.random()*0.15;
        el.style.left=from.x+'px';
        el.style.top=from.y+'px';
        el.style.setProperty('--tx',tx+'px');
        el.style.setProperty('--ty',ty+'px');
        el.style.setProperty('--dur',dur+'s');
        el.style.fontSize=(22+Math.random()*14)+'px';
        document.body.appendChild(el);
        setTimeout(()=>{
          spawnHit(to.x,to.y);
          el.remove();
        },dur*1000);
      },i*45);
    }
  }

  function spawnHit(x,y){
    for(let i=0;i<4;i++){
      const el=document.createElement('div'); el.className='hit-particle';
      el.textContent=['💧','💦','🫧'][Math.floor(Math.random()*3)];
      const a=Math.random()*Math.PI*2, d=25+Math.random()*40;
      el.style.left=x+'px'; el.style.top=y+'px';
      el.style.setProperty('--hx',Math.cos(a)*d+'px');
      el.style.setProperty('--hy',Math.sin(a)*d+'px');
      el.style.fontSize=(12+Math.random()*10)+'px';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),600);
    }
  }

  function spawnPlusOne(x,y){
    const el=document.createElement('div'); el.className='plus-one';
    el.textContent='+1 🥛'; el.style.left=(x-22)+'px'; el.style.top=(y-25)+'px';
    document.body.appendChild(el); setTimeout(()=>el.remove(),900);
  }

  function spawnStars(x,y){
    for(let i=0;i<6;i++){
      const el=document.createElement('div'); el.className='star';
      el.textContent=['⭐','✨','🌟'][Math.floor(Math.random()*3)];
      el.style.fontSize='22px';
      const a=(i/6)*Math.PI*2+Math.random()*.4,d=45+Math.random()*70;
      el.style.left=x+'px'; el.style.top=y+'px';
      el.style.setProperty('--sx',Math.cos(a)*d+'px');
      el.style.setProperty('--sy',Math.sin(a)*d+'px');
      document.body.appendChild(el); setTimeout(()=>el.remove(),1050);
    }
  }

  function showFarmerReaction(delay){
    setTimeout(()=>{
      farmerBubble.textContent=farmerBubbles[Math.floor(Math.random()*farmerBubbles.length)];
      farmerBubble.classList.add('show');
      milkOverlay.classList.add('show');
      farmer.classList.remove('splashed'); void farmer.offsetWidth; farmer.classList.add('splashed');
      clearTimeout(farmerTimer);
      farmerTimer=setTimeout(()=>{farmerBubble.classList.remove('show');milkOverlay.classList.remove('show');},1400);
    },delay);
  }

  function showCow(){
    cowBubble.textContent='🐄 '+cowBubbles[Math.floor(Math.random()*cowBubbles.length)];
    cowBubble.classList.add('show');
    clearTimeout(cowTimer); cowTimer=setTimeout(()=>cowBubble.classList.remove('show'),900);
  }

  function checkMilestone(){
    if(nextMilestoneIdx>=milestones.length)return;
    if(score>=milestones[nextMilestoneIdx]){
      milestoneEl.textContent=`🏆 ${milestones[nextMilestoneIdx]} ЛІТРІВ! Даша мокра!`;
      milestoneEl.classList.remove('pop'); void milestoneEl.offsetWidth; milestoneEl.classList.add('pop');
      nextMilestoneIdx++;
      for(let i=0;i<4;i++) setTimeout(()=>spawnStars(window.innerWidth/2+(Math.random()-.5)*260,window.innerHeight/2+(Math.random()-.5)*160),i*160);
    }
  }

  function milkCow(e){
    score++;
    scoreNum.textContent=score;
    updateProgress(); checkMilestone();
    const u=getUdderCenter();
    spawnPlusOne(u.x,u.y);
    showCow();
    shootMilk();
    showFarmerReaction(460);
    bucket.classList.remove('fill'); void bucket.offsetWidth; bucket.classList.add('fill');
    bucket.textContent=score>=20?'🫗':'🪣';
    if(score%5===0){cow.style.transform='scaleX(-1)';setTimeout(()=>cow.style.transform='',500);}
    e && e.stopPropagation();
  }

  udderBtn.addEventListener('click',milkCow);
  cow.addEventListener('click',milkCow);

  function resetGame(){
    score=0; nextMilestoneIdx=0;
    scoreNum.textContent='0'; progressFill.style.width='0%';
    progressNext.textContent='Ще 10 кліків'; bucket.textContent='🪣';
    [farmerBubble,milkOverlay,cowBubble].forEach(el=>{el.classList.remove('show');});
  }

  updateProgress();
</script>
</body>
</html>
