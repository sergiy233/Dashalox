<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Молочний Бум: Даша</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; cursor: none; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; text-shadow: 2px 2px 4px #000; font-size: 28px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">Очки: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let particles = [];
        let splashEffect = 0;

        // Позиція Даші
        const dasha = {
            x: canvas.width / 2,
            y: canvas.height - 150,
            headRadius: 35
        };

        class MilkDrop {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                // Летить у бік обличчя Даші
                this.vx = (dasha.x - x) * 0.03 + (Math.random() - 0.5) * 2;
                this.vy = -12;
                this.gravity = 0.4;
                this.active = true;
            }

            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;

                let dx = this.x - dasha.x;
                let dy = this.y - (dasha.y - 60);
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < dasha.headRadius) {
                    this.active = false;
                    triggerSplash();
                }

                if (this.y > canvas.height) this.active = false;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 8, 0, Math.PI * 2);
                ctx.fillStyle = "white";
                ctx.fill();
                ctx.closePath();
            }
        }

        function triggerSplash() {
            score += 1;
            scoreElement.innerText = score;
            splashEffect = 15;
            
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        let mouseX = 0, mouseY = 0;
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        window.addEventListener('mousedown', () => {
            for(let i=0; i<3; i++) particles.push(new MilkDrop(mouseX, mouseY));
        });

        function drawDasha() {
            // Волосся (задня частина)
            ctx.fillStyle = "#4b2c20"; // Темне волосся
            ctx.beginPath();
            ctx.arc(dasha.x - 20, dasha.y - 40, 20, 0, Math.PI * 2); // Хвостик зліва
            ctx.arc(dasha.x + 20, dasha.y - 40, 20, 0, Math.PI * 2); // Хвостик справа
            ctx.fill();

            // Сукня Даші
            ctx.fillStyle = "#FF1493"; // Яскраво-рожевий колір
            ctx.beginPath();
            ctx.moveTo(dasha.x - 40, dasha.y + 100);
            ctx.lineTo(dasha.x + 40, dasha.y + 100);
            ctx.lineTo(dasha.x + 20, dasha.y);
            ctx.lineTo(dasha.x - 20, dasha.y);
            ctx.fill();
            
            // Голова
            ctx.fillStyle = "#ffe0bd";
            ctx.beginPath();
            ctx.arc(dasha.x, dasha.y - 60, dasha.headRadius, 0, Math.PI * 2);
            ctx.fill();

            // Очі
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.arc(dasha.x - 10, dasha.y - 65, 3, 0, Math.PI * 2);
            ctx.arc(dasha.x + 10, dasha.y - 65, 3, 0, Math.PI * 2);
            ctx.fill();

            // Ефект молока
            if (splashEffect > 0) {
                ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
                ctx.beginPath();
                ctx.arc(dasha.x + (Math.sin(splashEffect)*5), dasha.y - 65, 25, 0, Math.PI * 2);
                ctx.fill();
                splashEffect--;
            }
        }

        function drawLever() {
            ctx.lineWidth = 15;
            ctx.strokeStyle = "#FF69B4";
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(mouseX, mouseY);
            ctx.lineTo(mouseX, mouseY + 50);
            ctx.stroke();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Трава
            ctx.fillStyle = "#32CD32";
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

            drawDasha();

            particles.forEach((p, index) => {
                p.update();
                p.draw();
                if (!p.active) particles.splice(index, 1);
            });

            drawLever();
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
